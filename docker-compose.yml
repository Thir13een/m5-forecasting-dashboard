services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: m5db
      POSTGRES_USER: m5
      POSTGRES_PASSWORD: m5pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "m5", "-d", "m5db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - C:/Users/krish/PROJECTS/M5/3-BOOSTING-TREES-RMSSE-0.98:/app/data/models:ro
      - C:/Users/krish/PROJECTS/M5:/app/data/m5:ro
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
